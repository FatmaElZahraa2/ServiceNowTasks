<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.6.9/angular.min.js"></script>
    <title>Document</title>
</head>

<body>
    <div ng-app="ToDoList" ng-controller="listCtrl">

        <div class="container my-5">
            <div class="row  justify-content-center ">
                <h5 class="text-secondary py-1">Daily Tasks</h5>
                <div class="row">
                    <input type="text" class="form-control col-lg-6 w-50" placeholder="New Task"
                        aria-describedby="addon-wrapping" ng-model="InsertedVal">
                    <div class="dropdown col-lg-6">
                        <button class="btn btn-dark w-50" type="button" ng-click="AddTask()" ng-disabled="!InsertedVal">
                            Add Task
                        </button>
                    </div>
                    <div class="mt-5">
                        <div ng-repeat="t in todoList">
                            <todo-list task="{{t.Task}}" index="{{$index}}"
                                remove-task="RemoveTask($index)"></todo-list>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script>
        var app = angular.module('ToDoList', []);
        app.controller('listCtrl', function ($scope) {

            $scope.InsertedVal = ""
            $scope.todoList = []
            $scope.AddTask = function () {
                $scope.todoList.push({ Task: $scope.InsertedVal })
                $scope.InsertedVal = ""
            }
            $scope.RemoveTask = function ($index) {
                $scope.todoList.splice($index, 1);
            }




        });
        app.directive('todoList', function () {
            return {
                scope: {

                    task: '@',
                    index: '@',
                    removeTask: '&'
                },
                template:
                    `
                   <div class="row d-inline-flex align-items-center w-100  border shadow-sm bg-white">
                   <input class="col form-check-input ms-2" type="checkbox" value="" id="flexCheckChecked" ng-model="isChecked" style="width: 1rem; height: 1rem; border-radius: 2px; flex: none;">
    
                   <p class="col mb-0" ng-class="{'text-decoration-line-through text-muted fst-italic': isChecked}" style="min-width: 200px;">
                     {{task}}
                  </p>
    
                  <button class="col btn btn-dark btn-sm me-2" type="button" ng-click="removeTask()">
                      <i class="fa-solid fa-x"></i>
                  </button>
                  </div>
                    `
            }
        })
    </script>
</body>

</html>
