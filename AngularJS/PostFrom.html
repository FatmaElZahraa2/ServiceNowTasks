<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.6.9/angular.min.js"></script>
    <title>Task</title>
</head>

<body>
    <div class="mt-5" ng-app="StudentApp" ng-controller="Sctrl">
        <div class="p-5 m-5 shadow-sm">
            <form name="LoginForm">
                <div class="mb-3">
                    <label for="exampleInputEmail1" class="form-label">Email address</label>
                    <input type="email" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp"
                        name="name" ng-model="UserEmail">
                    <div id="emailHelp" class="form-text">We'll never share your email with anyone else.</div>
                </div>
                <div class="mb-3">
                    <label for="exampleInputPassword1" class="form-label">Password</label>
                    <input type="password" class="form-control" id="exampleInputPassword1" name="email"
                        ng-model="UserPassword">
                </div>

                <button type="submit" class="btn btn-primary" ng-click="AddUser()">Submit</button>
            </form>
        </div>

    </div>

    <script>
        var app = angular.module('StudentApp', []);
        app.controller('Sctrl', function ($scope, $http) {
            $scope.studentsList = []
            $scope.ApiLink = "https://mxlicrxjbuyemwfteuvj.supabase.co/rest/v1/Login"
            $scope.ApiKey = "sb_publishable_MRmh7oZW60MXo8OKqgE1Gw_0x8BHwAo"
            $scope.headers = {
                "apikey": $scope.ApiKey,
                "Authorization": "Bearer " + $scope.ApiKey,
                "Content-Type": "application/json"
            }
            $scope.Users = []
            $http.get($scope.ApiLink, {
                headers: $scope.headers
            }).then(function (response) {
                // console.log(response)
                $scope.studentsList = response.data

            })
            $scope.User = { name: '', email: '' }
            $scope.AddUser = function () {
                if ($scope.UserEmail && $scope.UserPassword) {
                    console.log($scope.UserPassword)
                    $scope.User.name = $scope.UserEmail
                    $scope.User.email = $scope.UserPassword
                    $http.post($scope.ApiLink, $scope.User, {
                        headers: $scope.headers
                    })
                        .then(function (response) {
                            // console.log(response)
                            $scope.User = { name: '', email: '' }

                        })
                }
            }


        });
    </script>
</body>

</html>
