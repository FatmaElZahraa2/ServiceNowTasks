<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Card Gallery</title>
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.6.9/angular.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f3f4f7;
            font-family: 'Inter', sans-serif;
        }

        /* Modern Card Styling */
        .modern-card {
            border: none;
            border-radius: 20px;
            /* Extra rounded corners */
            overflow: hidden;
            /* Clips the image to the border radius */
            transition: all 0.3s ease-in-out;
            background: #fff;
        }

        /* Image Zoom Effect */
        .card-img-container {
            overflow: hidden;
            height: 220px;
        }

        .card-img-top {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .modern-card:hover {
            transform: translateY(-10px);
            /* Lifts card up */
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        }

        .modern-card:hover .card-img-top {
            transform: scale(1.1);
            /* Zooms image in slightly */
        }

        .btn-modern {
            border-radius: 12px;
            padding: 10px 20px;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 1px;
        }
    </style>
</head>

<body>

    <div class="container py-5" ng-app="App" ng-controller="ctrl">
        <div class="text-center mb-5">
            <h1 class="fw-bold">Discover More</h1>
            <p class="text-muted">Clean lines, soft corners, and smooth transitions.</p>
        </div>

        <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4" >

            <div class="col" ng-repeat="p in Products">

                <card title="{{p.title}}" price="{{p.price}}"></card>
            </div>

        </div>
    </div>
    <script>
        var app = angular.module('App', [])
        app.controller('ctrl', function ($scope) {

            $scope.Products = [
                { title: "Laptop", price: 1200 },
                { title: "Tablet", price: 2000 },
                { title: "iphone11", price: 8000 },

            ]

        })
        app.directive('card', function () {
            return {
                scope: {

                    title: '@',
                    price: '@'
                },
                template: ` 
            <div class="card h-100 modern-card shadow-sm">
                <div class="card-img-container">
                    <img src="https://images.unsplash.com/photo-1498050108023-c5249f4df085?auto=format&fit=crop&w=800&q=80" class="card-img-top" alt="Tech Image">
                </div>
                <div class="card-body p-4">
                    <span class="badge bg-light text-success mb-2">Tech</span>
                    <h5 class="card-title fw-bold">{{title}}</h5>
                    <p class="card-text text-muted">{{price}}</p>
                    <a href="#" class="btn btn-success btn-modern w-100">View Project</a>
                </div>
            </div>
       
`
            }
        })
    </script>

</body>

</html>
